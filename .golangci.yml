version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - noctx
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      severity: warning
    gosec:
      excludes:
        - G115 # noisy on bounded conversions; we explicitly bound port etc.

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofumpt
    - goimports
