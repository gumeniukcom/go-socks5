name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -count=1 -coverprofile=cover.out ./...
      - run: go tool cover -func=cover.out

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.0

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.25.x"

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/go-socks5 ./cmd/go-socks5
      - run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/hashpass ./cmd/hashpass
