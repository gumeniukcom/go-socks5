name: Fuzz

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { dir: ./internal/proxy, name: FuzzReadRequest }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
      - run: go test -run=^$ -fuzz=${{ matrix.target.name }} -fuzztime=120s -race ${{ matrix.target.dir }}
